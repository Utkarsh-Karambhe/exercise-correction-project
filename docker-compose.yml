version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    command: python web/server/manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: ./web/client
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
      - "4173:4173"
    volumes:
      - ./web/client:/app
      # Exclude node_modules so that the container uses its own installed modules
      - /app/node_modules
    environment:
      - VITE_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    command: npm run dev
